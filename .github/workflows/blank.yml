name: Download and Upload to Release

on:
  push:
    tags:
      - '1.3.38'
  workflow_dispatch: 

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 下载文件
      # 这里假设你要下载的文件URL是 https://example.com/myfile.zip
      # 你可以替换为你实际的文件下载地址
      - name: Download file
        run: |
          mkdir -p ./dist
          curl -L -o ./dist/easydown-arm-1.3.38.fpk http://150.138.92.109:9977/fpk/easydown-arm-1.3.38.fpk
          # 验证文件是否下载成功
          ls -lh ./dist/easydown-arm-1.3.38.fpk

      # 3. 创建 Release 并上传文件
      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v1
        with:
          files: ./dist/easydown-arm-1.3.38.fpk # 指定要上传的文件路径
          tag_name: ${{ github.ref_name }} # 使用当前触发的标签名
          release_name: Release ${{ github.ref_name }}
          body: |
            Automated release for ${{ github.ref_name }}.
            This release includes the downloaded artifact.
          draft: false # 是否为草稿
          prerelease: false # 是否为预发布
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # GitHub 自动提供的令牌，无需手动配置
