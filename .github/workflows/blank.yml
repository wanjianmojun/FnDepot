name: Download and Upload to Release

on:
  workflow_dispatch: 

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download file
        run: |
          mkdir -p ./dist
          curl -L -o ./dist/easydown-arm-1.3.38.fpk http://www.tswords.top/fpk/easydown-arm-1.3.38.fpk
          # 验证文件是否下载成功
          ls -lh ./dist/easydown-arm-1.3.38.fpk

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v1
        with:
          files: ./dist/easydown-arm-1.3.38.fpk
          tag_name: 1.3.38
          release_name: Release ${{ github.ref_name }}
          body: |
            Automated release for ${{ github.ref_name }}.
            This release includes the downloaded artifact.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
