name: Download and Upload to Release

on:
  workflow_dispatch: 

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download file
        run: |
          mkdir -p ./dist
          curl -L -o ./dist/easydown-arm-1.3.38.fpk http://www.tswords.top/fpk/easydown-arm-1.3.38.fpk
          # 验证文件是否下载成功
          ls -lh ./dist/easydown-arm-1.3.38.fpk
          curl -L -o ./dist/easydown-x86-1.3.38.fpk http://www.tswords.top/fpk/easydown-x86-1.3.38.fpk
          # 验证文件是否下载成功
          ls -lh ./dist/easydown-x86-1.3.38.fpk

      - name: 🚀 上传到 Release
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: 1.3.38
          body: |
            1. 近期攻击事件频发,出于安全考虑,此版本强制用户修改默认密码(123456)
            2. 密码最短长度调整为7位,禁止使用连续数字或有规律的数字密码
            3. 优化JD4K线路订阅生成strm时,若站点上传的版本有问题,后期站点又重新上传,导致获取的第一个版本无声音的问题
          files: |
            ./dist/easydown-arm-1.3.38.fpk
            ./dist/easydown-x86-1.3.38.fpk
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
